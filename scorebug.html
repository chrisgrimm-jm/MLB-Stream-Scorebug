<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MLB Scorebug</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0; padding: 0;
  background: transparent;
  width: 100%; height: 100%;
  overflow: hidden;
}
* { box-sizing: border-box; }

.root {
  position: fixed;
  bottom: 30px;
  right: 30px;
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
  display: flex;
  flex-direction: column-reverse;
  gap: 10px;
}

.bug {
  display: flex;
  align-items: stretch;
  height: 46px;
  gap: 9px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .4s ease, transform .4s ease;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7));
  border-radius: 3px;
}
.bug.show { opacity: 1; transform: translateY(0); }
.bug.final .seg-away,
.bug.final .seg-home { opacity: 0.45; }
.bug.final .seg-away-score,
.bug.final .seg-home-score,
.bug.final .seg-inning { opacity: 0.6; }

.seg {
  display: flex; align-items: center;
  justify-content: center; padding: 0;
  flex-shrink: 0; border-radius: 3px;
}

.seg-away { width: 96px; height: 46px; background: #e8291c; }
.away-abbr {
  font-size: 37px; font-weight: 900;
  letter-spacing: .02em; color: #fff;
  text-transform: uppercase;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}
.seg-away-score { width: 42px; height: 46px; background: #fff; }

.seg-inning {
  width: 88px; height: 46px;
  background: #fff;
  border-radius: 3px;
  position: relative;
  overflow: visible;
}
.diamond-svg {
  position: absolute; top: 0; left: 0;
  width: 88px; height: 46px;
  overflow: visible;
}
.diamond-content {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: row;
  align-items: center; justify-content: center;
  gap: 4px; z-index: 2;
}
.tri-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
}
.tri { width: 0; height: 0; opacity: 0; transition: opacity .2s; }
.tri.top-tri    { border-bottom: 6px solid #000; border-left: 5px solid transparent; border-right: 5px solid transparent; }
.tri.bottom-tri { border-top:    6px solid #000; border-left: 5px solid transparent; border-right: 5px solid transparent; }
.tri.on { opacity: 1; }
.inning-num { font-size: 22px; font-weight: 900; color: #000; line-height: 1; }

.base-sq {
  width: 9px; height: 9px;
  position: absolute;
  transform: rotate(45deg);
  background: rgba(0,0,0,0.1);
  border: 1.5px solid rgba(0,0,0,0.2);
  transition: background .2s, border-color .2s;
  z-index: 3;
}
.base-sq.on { background: #f59e0b; border-color: #d97706; }
.base-sq-2 { top: -1px; left: 50%; margin-left: -4.5px; }
.base-sq-1 { top: 18px; right: 11px; }
.base-sq-3 { top: 18px; left:  11px; }

.seg-home-score { width: 42px; height: 46px; background: #fff; }
.seg-home { width: 96px; height: 46px; background: #134a8e; }
.home-abbr {
  font-size: 37px; font-weight: 900;
  letter-spacing: .02em; color: #fff;
  text-transform: uppercase;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

.score-num {
  font-size: 42px; font-weight: 900;
  color: #000; letter-spacing: -.01em;
  line-height: 1; transition: color .25s;
}
.score-num.flash { animation: scoreFlash .7s ease forwards; }
@keyframes scoreFlash {
  0%   { transform: scale(1.5); color: #e05000; }
  60%  { transform: scale(1.15); color: #e05000; }
  100% { transform: scale(1); color: #000; }
}

.count-bar {
  display: flex; align-items: stretch;
  gap: 9px; margin-top: 9px; opacity: 1;
  filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7));
  transition: margin-left .3s ease;
}
.count-seg {
  display: flex; align-items: center;
  justify-content: center; gap: 6px;
  background: #fff; border-radius: 3px;
  padding: 0 13px; height: 34px; flex-shrink: 0;
}
.count-label {
  font-size: 16px; font-weight: 900;
  color: rgba(0,0,0,0.35); text-transform: uppercase; letter-spacing: .08em;
}
.dots { display: flex; gap: 5px; align-items: center; }
.dot {
  width: 13px; height: 13px; border-radius: 50%;
  background: rgba(0,0,0,0.1); border: 1.5px solid rgba(0,0,0,0.18);
  transition: background .2s, border-color .2s; flex-shrink: 0;
}
.dot.on-b { background: #22c55e; border-color: #16a34a; }
.dot.on-s { background: #f59e0b; border-color: #d97706; }
.dot.on-o { background: #ef4444; border-color: #dc2626; }

.seg-inning.no-bases .diamond-svg,
.seg-inning.no-bases .base-sq { display: none; }
.seg-inning.no-bases .inning-num { font-size: 42px; }
.seg-inning.no-bases .top-tri    { border-bottom-width: 10px; border-left-width: 8px; border-right-width: 8px; }
.seg-inning.no-bases .bottom-tri { border-top-width:    10px; border-left-width: 8px; border-right-width: 8px; }


</style>
</head>
<body>

<div class="root" id="root"></div>

<script>
const THEMES = {
  NYY:{p:'#003087',text:'#fff'}, BOS:{p:'#bd3039',text:'#fff'},
  TOR:{p:'#134a8e',text:'#fff'}, BAL:{p:'#df4601',text:'#fff'},
  TB: {p:'#092c5c',text:'#fff'}, CWS:{p:'#27251f',text:'#fff'},
  CLE:{p:'#00385d',text:'#fff'}, DET:{p:'#0c2340',text:'#fff'},
  KC: {p:'#004687',text:'#fff'}, MIN:{p:'#002b5c',text:'#fff'},
  HOU:{p:'#002d62',text:'#fff'}, LAA:{p:'#ba0021',text:'#fff'},
  ATH:{p:'#003831',text:'#efb21e'}, SEA:{p:'#0c2c56',text:'#fff'},
  TEX:{p:'#003278',text:'#fff'}, ATL:{p:'#ce1141',text:'#fff'},
  MIA:{p:'#00a3e0',text:'#fff'}, NYM:{p:'#002d72',text:'#fff'},
  PHI:{p:'#e81828',text:'#fff'}, WSH:{p:'#ab0003',text:'#fff'},
  CHC:{p:'#0e3386',text:'#fff'}, CIN:{p:'#c6011f',text:'#fff'},
  MIL:{p:'#ffc52f',text:'#12284b'}, PIT:{p:'#fdb827',text:'#1a1a14'},
  STL:{p:'#c41e3a',text:'#fff'}, AZ: {p:'#a71930',text:'#fff'},
  COL:{p:'#333366',text:'#fff'}, LAD:{p:'#005a9c',text:'#fff'},
  SD: {p:'#2f241d',text:'#fff'}, SF: {p:'#fd5a1e',text:'#fff'},
};
const DEFAULT_THEME = {p:'#1e2530',text:'#fff'};
const theme = a => THEMES[a] || DEFAULT_THEME;
const MLB = 'https://statsapi.mlb.com';

const params = new URLSearchParams(location.search);
const TOPIC  = params.get('topic') || '';

let delayMs  = 30000;
let pollRate = 5000;
let countHidden = [false, false, false];
let basesHidden = [false, false, false];
let todayGames = [];

// ── Build bug HTML ──
function buildBug(i) {
  const wrap = document.createElement('div');
  wrap.id = `wrap-${i}`;
  wrap.innerHTML = `
    <div class="bug" id="bug-${i}">
      <div class="seg seg-away" id="seg-away-${i}">
        <span class="away-abbr" id="away-abbr-${i}">—</span>
      </div>
      <div class="seg seg-away-score">
        <span class="score-num" id="away-score-${i}">0</span>
      </div>
      <div class="seg seg-inning">
        <svg class="diamond-svg" viewBox="0 0 110 50" xmlns="http://www.w3.org/2000/svg">
          <polygon points="55,5 90,25 55,45 20,25" fill="none" stroke="rgba(0,0,0,0.5)" stroke-width="2"/>
        </svg>
        <div class="base-sq base-sq-2" id="base2-${i}"></div>
        <div class="base-sq base-sq-1" id="base1-${i}"></div>
        <div class="base-sq base-sq-3" id="base3-${i}"></div>
        <div class="diamond-content">
          <div class="tri-col">
            <div class="tri top-tri" id="tri-top-${i}"></div>
            <div class="tri bottom-tri" id="tri-bot-${i}"></div>
          </div>
          <div class="inning-num" id="inning-num-${i}">—</div>
        </div>
      </div>
      <div class="seg seg-home-score">
        <span class="score-num" id="home-score-${i}">0</span>
      </div>
      <div class="seg seg-home" id="seg-home-${i}">
        <span class="home-abbr" id="home-abbr-${i}">—</span>
      </div>
    </div>
    <div class="count-bar" id="count-bar-${i}">
      <div class="count-seg">
        <span class="count-label">B</span>
        <div class="dots" id="ball-dots-${i}">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <div class="count-seg">
        <span class="count-label">S</span>
        <div class="dots" id="strike-dots-${i}">
          <div class="dot"></div><div class="dot"></div>
        </div>
      </div>
      <div class="count-seg">
        <span class="count-label">O</span>
        <div class="dots" id="out-dots-${i}">
          <div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>`;
  document.getElementById('root').appendChild(wrap);
}
[0,1,2].forEach(buildBug);

const bugs = [0,1,2].map(i => ({ idx:i, gamePk:null, pollTimer:null, prev:{}, done:false, lastData:null }));

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function apiFetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── ntfy SSE ──
let _sse = null;
let _sseReconnecting = false;
let _lastMsg = 0;

if (TOPIC) connectNtfy();

function connectNtfy() {
  if (_sseReconnecting) return;
  if (_sse) { try { _sse.close(); } catch {} _sse = null; }

  _sse = new EventSource(`https://ntfy.sh/${TOPIC}/sse?since=30m`);
  _lastMsg = Date.now();

  _sse.addEventListener('message', e => {
    _lastMsg = Date.now();
    try {
      const outer = JSON.parse(e.data);
      if (outer.event === 'keepalive') return;
      const cfg = JSON.parse(outer.message);
      applyConfig(cfg);
    } catch {}
  });

  _sse.onerror = () => {
    if (_sseReconnecting) return;
    _sseReconnecting = true;
    try { _sse.close(); } catch {}
    _sse = null;
    setTimeout(() => { _sseReconnecting = false; connectNtfy(); }, 5000);
  };
}

// Watchdog — if no message (including keepalives) for 90s, force reconnect
setInterval(() => {
  if (!TOPIC || _sseReconnecting) return;
  if (Date.now() - _lastMsg > 90000) {
    _sseReconnecting = false;
    connectNtfy();
  }
}, 30000);

function applyConfig(cfg) {
  if (typeof cfg.delay === 'number') delayMs = cfg.delay;
  if (typeof cfg.rate === 'number' && cfg.rate !== pollRate) {
    pollRate = cfg.rate;
    bugs.forEach(b => { if (b.gamePk && !b.done) watch(b, b.gamePk); });
  }
  if (Array.isArray(cfg.games)) {
    cfg.games.forEach((pk, i) => {
      if (String(pk || '') !== String(bugs[i].gamePk || '')) {
        bugs[i].done = false;
        watch(bugs[i], pk || null);
      }
    });
  }
  if (Array.isArray(cfg.hidden)) {
    cfg.hidden.forEach((h, i) => {
      const wrap = document.getElementById(`wrap-${i}`);
      if (wrap) wrap.style.display = h ? 'none' : '';
    });
  }
  if (Array.isArray(cfg.countHidden)) {
    cfg.countHidden.forEach((h, i) => {
      countHidden[i] = h;
      if (bugs[i].lastData) render(bugs[i], bugs[i].lastData);
    });
  }
  if (Array.isArray(cfg.basesHidden)) {
    cfg.basesHidden.forEach((h, i) => {
      basesHidden[i] = h;
      if (bugs[i].lastData) render(bugs[i], bugs[i].lastData);
    });
  }
}

// ── Schedule + polling ──
async function loadSchedule() {
  try {
    const data = await apiFetch(`${MLB}/api/v1/schedule?sportId=1&date=${todayStr()}&hydrate=team,linescore`);
    todayGames = data.dates?.[0]?.games || [];
    if (!todayGames.length) return;
    const live = todayGames.filter(g => g.status.abstractGameState === 'Live');
    const pool = live.length >= 3 ? live : todayGames;
    [0,1,2].forEach(i => {
      const g = pool[i] || pool[0];
      watch(bugs[i], g.gamePk);
    });
  } catch(e) { console.error(e); }
}


function watch(bug, pk) {
  bug.gamePk   = pk || null;
  bug.prev     = {};
  bug.done     = false;
  bug.firstRender = true;
  clearInterval(bug.pollTimer);
  if (!pk) return;
  poll(bug);
  bug.pollTimer = setInterval(() => poll(bug), pollRate);
}

async function poll(bug) {
  if (!bug.gamePk) return;
  const pk = bug.gamePk;
  try {
    const data = await apiFetch(`${MLB}/api/v1.1/game/${pk}/feed/live`);
    if (pk !== bug.gamePk) return;
    const useDelay = delayMs > 0 && !bug.firstRender;
    bug.firstRender = false;
    if (useDelay) {
      setTimeout(() => {
        if (pk !== bug.gamePk) return;
        render(bug, data);
      }, delayMs);
    } else {
      render(bug, data);
    }
  } catch(e) { console.error(e); }
}

function render(bug, data) {
  bug.lastData = data;
  const i  = bug.idx;
  const gd = data.gameData;
  const ls = data.liveData?.linescore || {};
  const state    = gd.status.abstractGameState;
  const detailed = gd.status.detailedState || '';
  const isFinal  = state === 'Final' || detailed === 'Game Over' || detailed.startsWith('Final');

  const awayAbbr  = gd.teams.away.abbreviation;
  const homeAbbr  = gd.teams.home.abbreviation;
  const awayScore = ls.teams?.away?.runs ?? 0;
  const homeScore = ls.teams?.home?.runs ?? 0;
  const inning    = ls.currentInning || 0;
  const half      = ls.inningHalf || '';

  const at = theme(awayAbbr), ht = theme(homeAbbr);
  document.getElementById(`seg-away-${i}`).style.background  = at.p;
  document.getElementById(`seg-home-${i}`).style.background  = ht.p;
  document.getElementById(`away-abbr-${i}`).style.color = at.text;
  document.getElementById(`home-abbr-${i}`).style.color = ht.text;
  document.getElementById(`away-abbr-${i}`).textContent = awayAbbr;
  document.getElementById(`home-abbr-${i}`).textContent = homeAbbr;

  const awayEl = document.getElementById(`away-score-${i}`);
  const homeEl = document.getElementById(`home-score-${i}`);
  if (bug.prev.away !== undefined && awayScore > bug.prev.away) flashEl(awayEl);
  if (bug.prev.home !== undefined && homeScore > bug.prev.home) flashEl(homeEl);
  awayEl.textContent = awayScore;
  homeEl.textContent = homeScore;

  const numEl   = document.getElementById(`inning-num-${i}`);
  const triT    = document.getElementById(`tri-top-${i}`);
  const triB    = document.getElementById(`tri-bot-${i}`);
  const bugEl   = document.getElementById(`bug-${i}`);
  const inningEl = bugEl.querySelector('.seg-inning');
  inningEl.classList.toggle('no-bases', !!basesHidden[i]);

  if (isFinal) {
    numEl.textContent = 'F';
    triT.classList.remove('on'); triB.classList.remove('on');
    bugEl.classList.add('show', 'final');
    if (!bug.done) {
      bug.done = true;
      clearInterval(bug.pollTimer);
      bug.pollTimer = null;
    }
  } else if (state === 'Live') {
    numEl.textContent = inning;
    triT.classList.toggle('on', half === 'Top');
    triB.classList.toggle('on', half === 'Bottom');
    bugEl.classList.add('show');
    bugEl.classList.remove('final');
  } else {
    numEl.textContent = '1';
    triT.classList.add('on');
    triB.classList.remove('on');
    bugEl.classList.add('show');
    bugEl.classList.remove('final');
  }

  bug.prev = { away: awayScore, home: homeScore };

  const cb = document.getElementById(`count-bar-${i}`);
  if (isFinal || countHidden[i]) {
    cb.style.display = 'none';
  } else {
    cb.style.display = '';
    updateDots(`ball-dots-${i}`,   ls.balls   ?? 0, 3, 'on-b');
    updateDots(`strike-dots-${i}`, ls.strikes ?? 0, 2, 'on-s');
    updateDots(`out-dots-${i}`,    ls.outs    ?? 0, 2, 'on-o');
    const off = ls.offense || {};
    document.getElementById(`base1-${i}`).classList.toggle('on', !!off.first);
    document.getElementById(`base2-${i}`).classList.toggle('on', !!off.second);
    document.getElementById(`base3-${i}`).classList.toggle('on', !!off.third);
    cb.style.marginLeft = half === 'Bottom' ? '138px' : '0px';
    cb.classList.add('show');
  }
}

function flashEl(el) {
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}
function updateDots(id, count, max, cls) {
  document.querySelectorAll(`#${id} .dot`).forEach((d,i) => {
    d.className = 'dot' + (i < count ? ' '+cls : '');
  });
}

function schedule3amRefresh() {
  const now  = new Date();
  const next = new Date(now);
  next.setHours(3, 0, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  setTimeout(() => {
    loadSchedule();
    setInterval(loadSchedule, 24 * 60 * 60 * 1000);
  }, next - now);
}

loadSchedule();
schedule3amRefresh();
</script>
</body>
</html>
